# ──────────────────────────────────────────────────────────────────────────────
# WiFi Captive Portal — Docker Compose (Development Convenience)
#
# Two services demonstrate the federated key-shard architecture for local testing:
#   portal   — primary node (acts as captive portal gateway)
#   neighbor — secondary node (holds one key shard for portal's filesystem)
#
# Both nodes exchange shards on boot so each can reconstruct the master key
# and mount its secure filesystem partition.
#
# Production path is singleton Python venv profiles (linux-rpi-venv/windows-venv).
# This file is kept as optional dev/test-only convenience.
# ──────────────────────────────────────────────────────────────────────────────

services:

  portal:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - portal_data:/data
    environment:
      - NODE_ID=node-1
      - RUNTIME_PROFILE=docker-dev
      - NODE_HOST=portal
      - NEIGHBOR_NODES=neighbor:5000
      - SECRET_KEY=CHANGE_THIS_TO_A_RANDOM_SECRET_IN_PRODUCTION
      - FEDERATION_SHARED_SECRET=CHANGE_THIS_CLUSTER_FEDERATION_SECRET
      - NODE_SHARED_SECRET=CHANGE_THIS_CLUSTER_FEDERATION_SECRET
      - FEDERATION_MOUNT_MODE=simulation
      - ALLOW_SIMULATION_FALLBACK=1
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - FLASK_ENV=development
    restart: unless-stopped
    networks:
      - captive_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3

  neighbor:
    build: ./backend
    ports:
      - "5001:5000"
    volumes:
      - neighbor_data:/data
    environment:
      - NODE_ID=node-2
      - RUNTIME_PROFILE=docker-dev
      - NODE_HOST=neighbor
      - NEIGHBOR_NODES=portal:5000
      - SECRET_KEY=CHANGE_THIS_TO_A_RANDOM_SECRET_IN_PRODUCTION
      - FEDERATION_SHARED_SECRET=CHANGE_THIS_CLUSTER_FEDERATION_SECRET
      - NODE_SHARED_SECRET=CHANGE_THIS_CLUSTER_FEDERATION_SECRET
      - FEDERATION_MOUNT_MODE=simulation
      - ALLOW_SIMULATION_FALLBACK=1
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - FLASK_ENV=development
    restart: unless-stopped
    networks:
      - captive_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  portal_data:
  neighbor_data:

networks:
  captive_net:
    driver: bridge
